<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obra Clara Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#f6f4ef;--surface:#ffffff;--text:#1f1d18;--primary:#0e6c73;--border:#ddd6ca}
    body{font-family:system-ui;background:var(--bg);color:var(--text);margin:0;padding:20px}
    .card{background:var(--surface);padding:20px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px}
    .btn{padding:10px 15px;border-radius:999px;border:none;background:var(--primary);color:white;cursor:pointer}
    .item{padding:10px;background:#f0ece5;margin-bottom:5px;border-radius:8px}
  </style>
</head>
<body>
  <div class="app">
    <nav>
      <button onclick="setSection('obras')">Obras</button>
      <button onclick="setSection('documentos')">Documentos</button>
    </nav>
    <main id="main">
      <section class="section" id="obras" style="display:none">
        <div class="card">
          <h3>Obras</h3>
          <div id="projectsList"></div>
        </div>
        <div class="card">
          <form id="projectForm">
            <input id="newProjName" placeholder="Nombre obra" required>
            <input id="newProjClient" placeholder="Cliente" required>
            <button class="btn" type="submit">Crear</button>
          </form>
        </div>
      </section>
      <section class="section" id="documentos" style="display:none">
        <div class="card">
          <h3>Documentos en Nube</h3>
          <div id="docsList"></div>
        </div>
        <div class="card">
          <form id="docForm">
            <select id="docProject"></select>
            <input id="docFile" type="file" required>
            <button class="btn" type="submit">Subir a Supabase</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script>
    const KEY = 'obra-clara-pro-v5';
    const supabase = window.supabase.createClient('https://fatrjeaalnlorctlvqxb.supabase.co', 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhdHJqZWFhbG5sb3JjdGx2cXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0OTAzMjIsImV4cCI6MjEwMDA2NjMyMn0._BeajzkvD28ECBlNdq65HCQWuA4gKrGtrUt-V8mlVxc');

    let state = JSON.parse(localStorage.getItem(KEY)) || { projects: [], docs: [] };

    function save() {
      localStorage.setItem(KEY, JSON.stringify(state));
      supabase.storage.from('documentos').upload('db/state.json', JSON.stringify(state), { upsert: true });
      render();
    }

    function render() {
      document.getElementById('projectsList').innerHTML = state.projects.map(p => `<div class="item">${p.name}</div>`).join('');
      document.getElementById('docsList').innerHTML = state.docs.map(d => `
        <div class="item">${d.name} <a href="${d.url}" target="_blank">Descargar</a></div>
      `).join('');
      const opts = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
      if(document.getElementById('docProject')) document.getElementById('docProject').innerHTML = opts;
    }

    function setSection(id) {
      document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    document.getElementById('projectForm').onsubmit = e => {
      e.preventDefault();
      state.projects.push({id: Date.now(), name: document.getElementById('newProjName').value});
      save();
    };

    document.getElementById('docForm').onsubmit = async e => {
      e.preventDefault();
      const file = document.getElementById('docFile').files[0];
      const { data, error } = await supabase.storage.from('documentos').upload(`docs/${file.name}`, file);
      const { data: urlData } = supabase.storage.from('documentos').getPublicUrl(`docs/${file.name}`);
      state.docs.push({ id: Date.now(), name: file.name, url: urlData.publicUrl });
      save();
    };

    setSection('obras');
    render();
  </script>
</body>
</html>
